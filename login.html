
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header>
        <h1>Biblioteca do Futuro</h1>
        <p>Cadastro de Clientes</p>
    </header>

    <div class="quadro">

        <h2>👤 Cadastro</h2>

        <div class="campo-grupo">
            <label>Nome</label>
            <input type="text" id="NomeCompleto">
        </div>

        <div class="campo-grupo">
            <label>CPF</label>
            <input type="text" id="CPF">
        </div>

        <div class="campo-grupo">
            <label>Email</label>
            <input type="email" id="Email">
        </div>

        <button class="btn-azul" onclick="fazerLogin()">
            Cadastrar
        </button>


        <div class="titulo-sublista">
            Clientes Cadastrados
        </div>

        <ul id="lista-clientes"></ul>

         <a href="busca.html" class="btn-prosseguir">
            Ir para Busca de Livros
        </a>

    </div>

    <script src="script.js"></script>

</body>

</html>
